name: TEST Gated Deploy Workflow

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Service name"
        required: true
        type: choice
        options:
          - users
          - orders
          - cart
      environment:
        description: "Environment name"
        required: true
        type: choice
        options:
          - dev
          - stage
          - prod

jobs:
  init:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup
        run: |
          echo "Initializing workflow..."

  service-gate:
    needs: init
    if: ${{ inputs.service != '' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.service }}
    steps:
      - name: Check service readiness
        run: |
          echo "Service gate passed."

  environment-gate:
    needs: init
    if: ${{ inputs.environment != '' }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Check environment readiness
        run: |
          echo "Environment gate passed."

  deploy:
    needs: [service-gate, environment-gate]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Deploy
        run: |
          echo "Deployment complete."
